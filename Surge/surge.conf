[General]
# === GENERAL SETTINGS ===
# Enhanced Wi-Fi Assist
wifi-assist = true
# Hybrid Network - Set to false to avoid connection issues
all-hybrid = false
# Gaming Optimization - Disable UDP priority for stability
udp-priority = false
# IPv6 Support - Disabled for compatibility
ipv6 = false

# === CONNECTIVITY TEST ===
# Internet connectivity test URL
internet-test-url = http://wifi.vivo.com.cn/generate_204
# Proxy connectivity test URL
proxy-test-url = http://cp.cloudflare.com/generate_204
# Test timeout in seconds
test-timeout = 5

# === GEOIP DATABASE ===
# MaxMind GeoIP database for accurate geolocation
geoip-maxmind-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb

# === WI-FI ACCESS ===
# Allow Wi-Fi access
allow-wifi-access = true
# HTTP port for Surge iOS (default: 6152)
wifi-access-http-port = 6152
# SOCKS5 port for Surge iOS (default: 6153)
wifi-access-socks5-port = 6153
# HTTP listen address for Surge Mac
http-listen = 0.0.0.0
# SOCKS5 listen address for Surge Mac
socks5-listen = 0.0.0.0
# Allow hotspot access
allow-hotspot-access = true

# === REMOTE CONTROLLER ===
# External controller access
external-controller-access = qwervbnm@0.0.0.0:6160
# HTTP API configuration
http-api = qwervbnm@0.0.0.0:6166
http-api-tls = true
http-api-web-dashboard = true

# === COMPATIBILITY ===
# Compatibility mode (0 = disabled)
compatibility-mode = 0

# === BYPASS PROXY ===
# Skip proxy for these addresses
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
# Exclude simple hostnames
exclude-simple-hostnames = true

# === DNS SETTINGS ===
# Read system hosts file
read-etc-hosts = true
# Use local host item for proxy
use-local-host-item-for-proxy = true
# Encrypted DNS follow outbound mode
encrypted-dns-follow-outbound-mode = false
# Include all networks
include-all-networks = false
# Include local networks
include-local-networks = false
# DNS servers
dns-server = 223.5.5.5, 223.6.6.6, system
loglevel = notify
# === ADVANCED SETTINGS ===
# Logging level
show-error-page-for-reject = true
# Show error page for reject
always-real-ip = link-ip.nextdns.io, *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, stun.l.google.com
# Always use real IP for these domains
hijack-dns = 8.8.8.8:53, 8.8.4.4:53
# Hijack DNS requests
force-http-engine-hosts = *.ott.cibntv.net, 123.59.31.1, 119.18.193.135, 122.14.246.33, 175.102.178.52, 116.253.24.*, 175.6.26.*, 220.169.153.*
# Force HTTP engine hosts
udp-policy-not-supported-behaviour = REJECT
# Use default policy if Wi-Fi not primary
ipv6-vif = auto
# UDP policy not supported behavior
# IPv6 VIF mode
encrypted-dns-server = 

[Proxy]



[Proxy Group]
# === MAIN POLICY GROUPS ===
# Main selection between China Direct and Global Proxy
🚀 Select = select, "🇨🇳 China Direct", "🌍 Global Proxy", no-alert=0, hidden=0, include-all-proxies=0

# Global proxy with Global Proxy selection
🌍 Global Proxy = select, "🇭🇰 Hong Kong", "🇯🇵 Japan", "🇸🇬 Singapore", "🇺🇸 United States", "🇬🇧 United Kingdom", "📡 All Servers", no-alert=0, hidden=0, include-all-proxies=0

# All server group from subscription
📡 All Servers = select, update-interval=0, no-alert=0, hidden=0, include-all-proxies=0, policy-regex-filter=^((?!Remain|Expired|官网|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$

# === REGIONAL POLICY GROUPS ===
🇭🇰 Hong Kong = select, aliyunHK, "akile HK", update-interval=0, policy-regex-filter=港|🇭🇰|香港|HK|Hong, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=📡 All Servers
🇯🇵 Japan = select, update-interval=0, policy-regex-filter=日|🇯🇵|日本|JP|Japan, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=📡 All Servers
🇸🇬 Singapore = select, update-interval=0, policy-regex-filter=坡|🇸🇬|新加坡|狮城|SG|Singapore, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=📡 All Servers
🇺🇸 United States = select, dmit, BanWaGong, Deirock, "dedirock hy", update-interval=0, policy-regex-filter=美|🇺🇸|美国|US|States|American, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=📡 All Servers
🇬🇧 United Kingdom = select, update-interval=0, policy-regex-filter=🇬🇧|英国|英|英格兰|UK|United Kingdom, interval=600, tolerance=50, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=📡 All Servers
🇩🇪Germany = select, "zgo DE", "bitsflow DE", update-interval=0, policy-regex-filter=德|德国|Germany|DE|🇩🇪, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/erdongchanyo/icon/main/Policy-Country/DE.png

